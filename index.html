<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <ul class="comments">
      </ul>
      <div class="add-form">
        <input
          type="text"
          class="add-form-name"
          placeholder="Введите ваше имя"
        />
        <textarea
          type="textarea"
          class="add-form-text"
          placeholder="Введите ваш коментарий"
          rows="4"
        ></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>
    </div>
  </body>

  <script>
    "use strict";

    // СОЗДАЮ МАССИВ С ОБЪЕКТАМИ ИЗ РАЗМЕТКИ HTML
  const comments = [
      {
        name: "Глеб Фокин",
        date: "12.02.22 12:18",
        text: "Это будет первый комментарий на этой странице",
        likes: 3,
        isLiked: false
      },
      {
        name: "Варвара Н.",
        date: "13.02.22 19:22",
        text: "Мне нравится как оформлена эта страница! ❤",
        likes: 75,
        isLiked: true
      }
    ];

    const formName = document.querySelector('.add-form-name');
    const formText = document.querySelector('.add-form-text');
    const formButton = document.querySelector('.add-form-button');
    const conteinerComments = document.querySelector('.comments');
    

    // СОЗДАЮ РЕНДЕР ФУНКЦИЮ И ПЕРЕБИРАЮ ВОЗВРАЩАЯ КОНТЕНТ ПО КЛЮЧАМ
    function renderComments () {
        const commentsHTML = comments.map((comment, index) => {
          const likeButtonClass = comment.isLiked 
          ? 'like-button -active-like' 
          : 'like-button';
          return `<li class="comment">
          <div class="comment-header">
            <div>${comment.name}</div>
            <div>${comment.date}</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">${comment.text}</div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">${comment.likes}</span>
              <button class="${likeButtonClass}" data-index="${index}"></button>
            </div>
          </div>
        </li>`}).join(""); /*склеиваем массив в строку */
        
        conteinerComments.innerHTML = commentsHTML; /*добавляем массив HTML */

        const likeButtons = document.querySelectorAll('.like-button')
        for (const button of likeButtons) {
        button.addEventListener('click', likeHandler);
    }
  }

   function likeHandler(event) {
      // Получаем индекс комментария из data-атрибута
      const index = event.currentTarget.dataset.index;
      const comment = comments[index];
      
    // Счетчик лайков туда и обратно
      if (comment.isLiked) {
      
        comment.likes--;
        comment.isLiked = false;
      } else {
     
        comment.likes++;
        comment.isLiked = true;
      }
      renderComments (); 
    }

  
    formButton.addEventListener('click', ()  => {
      formName.classList.remove("error");
      formText.classList.remove("error");

      if (formName.value === "") {
        formName.classList.add("error");
        return;
      }

      if (formText.value === "") {
        formText.classList.add("error");
        return;
      }

    const now = new Date();
    const date = 
    now.getDate().toString().padStart(2, '0') + '.' + 
    (now.getMonth() + 1).toString().padStart(2, '0') + '.' + 
    now.getFullYear().toString().slice(-2) + ' ' + 
    now.getHours().toString().padStart(2, '0') + ':' + 
    now.getMinutes().toString().padStart(2, '0');

     comments.push({
        name: formName.value,
        date: date,
        text: formText.value,
        likes: 0,
        isLiked: false
      });

     renderComments ();

   
    formName.value = "";
    formText.value = "";

    });
     renderComments ();
   
  </script>
</html>
